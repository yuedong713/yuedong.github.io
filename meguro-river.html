<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>目黑川千鸟渊 - 樱花视觉盛宴</title>
    <!-- 引入外部资源 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f9f9f9;
            color: #333;
            line-height: 1.6;
        }

        /* 导航栏样式 */
        .navbar {
            background-color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 1rem 0;
        }

        .back-home {
            color: #333;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .back-home i {
            margin-right: 8px;
            font-size: 1.2rem;
        }

        .back-home:hover {
            color: #d4af37; /* 樱花金配色 */
            transform: translateX(-3px);
        }

        /* 页面标题区 */
        .page-header {
            text-align: center;
            padding: 2rem 0;
            background-color: #fff;
        }

        .page-title {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: #7f8c8d;
            font-size: 1rem;
        }

        /* 视频容器样式 */
        .video-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9比例 */
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .cherry-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 视频说明区 */
        .video-desc {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            text-align: center;
        }

        .desc-title {
            font-size: 1.5rem;
            color: #2c3e50;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .desc-title i {
            color: #d4af37;
            margin-right: 10px;
        }

        .desc-content {
            color: #555;
            line-height: 1.8;
        }

        /* 页脚 */
        footer {
            background-color: #2c3e50;
            color: rgba(255,255,255,0.8);
            text-align: center;
            padding: 1.5rem 0;
            margin-top: 3rem;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .page-title {
                font-size: 1.6rem;
            }
            .desc-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 - 返回主页 -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="back-home">
                <i class="fa fa-arrow-left"></i>
                返回主页
            </a>
        </div>
    </nav>

    <!-- 页面标题 -->
    <div class="page-header">
        <h1 class="page-title">目黑川千鸟渊 樱花视觉盛宴</h1>
        <p class="page-subtitle">樱花飘落的瞬间，是春天写给东京的诗</p>
    </div>

    <!-- 视频展示区 -->
    <div class="video-container">
        <div class="video-wrapper">
            <!-- 视频源替换为实际樱花视频路径 -->
            <video class="cherry-video" controls autoplay loop muted playsinline>
                <source src="img/videomeguro-cherry.mp4" type="video/mp4">
                <!-- 备选视频格式 -->
                <source src="videomeguro-cherry.webm" type="video/webm">
                您的浏览器不支持视频播放，请更新浏览器。
            </video>
        </div>
    </div>

    <!-- 视频说明 -->
    <div class="video-desc">
        <h2 class="desc-title"><i class="fa fa-pagelines"></i>关于目黑川樱花</h2>
        <p class="desc-content">
            目黑川是东京最著名的赏樱地之一，沿河两岸种植了约800棵樱花树。当樱花盛开时，粉色的花瓣随风飘落，宛如粉色的雪花覆盖整个河岸，形成"樱花雨"的绝美景观。<br><br>
            视频捕捉了目黑川樱花飘落的瞬间，配合潺潺流水声，展现了东京春天最动人的自然盛宴。千鸟渊与目黑川相邻，同样以樱花闻名，两处合称为东京赏樱的"视觉双绝"。
        </p>
    </div>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p>© 目黑川樱花视频</p>
        </div>
    </footer>

    <!-- 引入Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
